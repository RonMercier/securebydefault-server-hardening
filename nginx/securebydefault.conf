# securebydefault-server-hardening — nginx/securebydefault.conf
#
# Production Nginx config for a cloud VPS serving:
#   - A static HTML homepage at the root /
#   - A WordPress installation at /blog
#
# Customize: Replace 'securebydefault.io' with your domain.
#            Replace cert paths if not using Let's Encrypt.
#            Adjust PHP-FPM socket path if not using PHP 8.3.
#
# See README for deployment steps.

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name securebydefault.io www.securebydefault.io;
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name securebydefault.io www.securebydefault.io;

    # SSL — Let's Encrypt / Certbot
    ssl_certificate /etc/letsencrypt/live/securebydefault.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/securebydefault.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── SECURITY HEADERS ──────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # Block wrong Host headers (prevents host header injection)
    if ($host !~* ^(securebydefault\.io|www\.securebydefault\.io)$) {
        return 444;
    }

    # ── STATIC HOMEPAGE ───────────────────────────────────────
    # Serves only the root index and specific static files.
    # Uses exact-match (=) to prevent unintended path traversal.

    location = / {
        root /var/www/securebydefault.io/html;
        try_files /index.html =404;
    }

    location = /index.html {
        root /var/www/securebydefault.io/html;
    }

    # Static file types served from root (PDFs, images, etc.)
    # Regex limited to safe extensions only — not a catch-all
    location ~ ^/[^/]+\.(pdf|png|jpg|jpeg|gif|svg|ico|txt|webp)$ {
        root /var/www/securebydefault.io/html;
        try_files $uri =404;
    }

    # ── WORDPRESS BLOG (/blog) ────────────────────────────────
    location ^~ /blog {
        root /var/www/securebydefault.io;
        index index.php index.html;
        try_files $uri $uri/ /blog/index.php?$args;

        # Block sensitive file types inside /blog
        location ~* \.(ini|log|conf|bak|sql|sh|env|config|backup|gz|tar|zip)$ {
            deny all;
            return 404;
        }

        # Block credential and system paths inside /blog
        location ~* /(\.aws|\.git|\.ssh|\.user\.ini|credentials|secrets)$ {
            deny all;
            return 404;
        }

        # Block XML-RPC (WordPress brute-force vector)
        location = /blog/xmlrpc.php {
            deny all;
            return 404;
        }

        # PHP-FPM processing
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # ── GLOBAL BLOCK RULES ────────────────────────────────────
    # These apply to every request, regardless of location.

    # Block all dotfiles (.env, .git, .htaccess, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }

    # Block common credential-probing paths
    # This is what stopped the attacks in the first 24 hours
    location ~* /(\.aws|\.git|\.ssh|credentials|secrets|\.env)/ {
        deny all;
        return 404;
    }

    # Block common admin panel and exploit discovery paths
    location ~* ^/(wp-login\.php|phpmyadmin|admin|manager|server-status|info\.php|phpinfo\.php)$ {
        deny all;
        return 404;
    }

    # ── PERFORMANCE ───────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
}
